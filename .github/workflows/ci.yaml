name: CI Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        # This triggers the embedding logic in your .csproj automatically
        run: dotnet build -c Release -o ./build

      - name: Upload Build Artifact
        # This lets you grab the .dll from the 'Actions' tab for quick testing
        uses: actions/upload-artifact@v4
        with:
          name: Havoc-CI-Build
          path: ./build/Havoc.dll
          if-no-files-found: error
