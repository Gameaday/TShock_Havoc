name: Build and Release Havoc

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Plugin
        # A standard build automatically executes our embedding logic
        run: dotnet build -c Release -o ./publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Havoc ${{ github.ref_name }}
          # We ONLY upload the single Havoc.dll. The dependencies are already safely packed inside it.
          files: ./publish/Havoc.dll
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
